<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded Background with Gradient -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)" />
  
  <!-- Subtle inner border for 3D depth -->
  <rect x="8" y="8" width="496" height="496" rx="120" stroke="white" stroke-opacity="0.1" stroke-width="16" />

  <!-- Dollar sign icon in the center -->
  <g transform="translate(112, 112) scale(12)" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="1" x2="12" y2="23" stroke="#FFFFFF" />
    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#FFFFFF" />
  </g>

  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#3B82F6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan -->
    </linearGradient>
  </defs>
</svg>
